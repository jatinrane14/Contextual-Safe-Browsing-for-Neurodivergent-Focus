<!DOCTYPE html>
<html>
<head>
  <style>
    body { font-family: Arial; width: 250px; padding: 10px; }
    input, select, button { width: 100%; margin-top: 5px; }
    #timerContainer { display: none; }
  </style>
</head>
<body>

<h3>Focus Guard</h3>

<select id="mode">
  <option value="manual">Manual</option>
  <option value="timer">Timer</option>
</select>

<select id="level">
  <option value="">Select level of focus</option>
  <option value="basic">Basic(Local Model)</option>
  <option value="advanced">Advanced(AI - decisions)</option>
</select>

<input id="intent" placeholder="Goal (e.g Learn React)"/>

<div id="timerContainer">
  <input id="time" type="number" placeholder="Minutes"/>
</div>

<button id="start">Start</button>
<button id="stop">Stop</button>

<p id="status"></p>

<script src="popup.js"></script>

</body>
</html>
